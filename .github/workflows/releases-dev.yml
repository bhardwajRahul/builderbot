name: 🚀 (DEV) Liberando versiones

on:
    workflow_dispatch:
    push:
        branches:
            - builderbot-dev

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    NODE_VERSION: 22.20.0

jobs:
    ############ TEST ############
    test:
        name: 🧪 Tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - name: Cache pnpm store
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: pnpm-${{ runner.os }}-

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Run Tests
              run: pnpm test

    ############ BUILD ############
    build:
        name: 🔨 Build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - uses: pnpm/action-setup@v4

            - name: Cache pnpm store
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: pnpm-${{ runner.os }}-

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Build Packages
              run: pnpm run clean.lib && pnpm run build

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: dist-packages
                  path: packages/*/dist
                  retention-days: 1

    ############ RELEASE ############
    release:
        name: 📦 Release Alpha
        runs-on: ubuntu-latest
        needs: [test, build]
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
                  persist-credentials: false

            - uses: pnpm/action-setup@v4

            - name: Cache pnpm store
              uses: actions/cache@v4
              with:
                  path: ~/.pnpm-store
                  key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
                  restore-keys: pnpm-${{ runner.os }}-

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: 'pnpm'
                  registry-url: https://registry.npmjs.org/

            - name: Install Dependencies
              run: pnpm install --frozen-lockfile

            - name: Download build artifacts
              uses: actions/download-artifact@v4
              with:
                  name: dist-packages
                  path: packages

            - name: Release Alpha
              id: release
              run: |
                  # Obtener versión base sin sufijo alpha
                  BASE_VERSION=$(node -p "require('./lerna.json').version.replace(/-alpha.*/, '')")
                  NEW_VERSION="${BASE_VERSION}-alpha.${{ github.run_number }}"
                  echo "📦 Publicando versión: $NEW_VERSION"

                  # Actualizar versión en todos los paquetes
                  npx lerna version $NEW_VERSION --force-publish --yes --no-git-tag-version --no-push

                  # Publicar al tag alpha
                  npx lerna publish from-package --dist-tag alpha --yes 2>&1 | tee release-output.txt
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: 📋 Log Deployed Version
              run: |
                  echo "=========================================="
                  echo "🚀 VERSIÓN DESPLEGADA (ALPHA)"
                  echo "=========================================="
                  echo "📅 Fecha: $(date)"
                  echo "🔗 Commit: ${{ github.sha }}"
                  echo "👤 Actor: ${{ github.actor }}"
                  echo "------------------------------------------"
                  echo "📦 Paquetes publicados:"
                  npx lerna ls --json | jq -r '.[] | "  - \(.name): \(.version)"'
                  echo "=========================================="
