name: 🚀⚡ Liberando versiones

on:
    push:
        branches:
            - builderbot-prod
jobs:
    ############ RELEASE ############
    release-prod:
        if: ${{ !github.event.act }}
        name: Release
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v3

            - name: Set output
              id: vars
              run: echo "tag=${GITHUB_REF#refs/*/}" >> $GITHUB_OUTPUT

            - uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v3
              with:
                  node-version: 22.20.0
                  cache: 'pnpm'
                  registry-url: https://registry.npmjs.org/

            - run: corepack enable

            - name: Set User
              run: git config --global user.email "leifer.contacto@gmail.com" && git config --global user.name "Leifer Mendez"

            - name: Install NPM Dependencies
              run: pnpm install --frozen-lockfile

            - name: Set CHANGELOG
              run: pnpm run release

            - name: get-npm-version
              id: package-version
              uses: martinbeentjes/npm-get-version-action@main

            - name: Build Package
              run: pnpm build:full

            - name: Release Latest
              run: npx lerna publish from-package --dist-tag latest --yes
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

            - name: Release Github
              run: node ./scripts/github.js --version="${{ steps.package-version.outputs.current-version}}" --token="${{ secrets.OCTO_TOKEN }}"
